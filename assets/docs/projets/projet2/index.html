<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>勤務時間管理 | Gestion du Temps de Travail</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="particlesCanvas"></canvas>
    <div class="container">
      <h1>勤務時間管理<br /><span>Gestion du Temps de Travail</span></h1>

      <div class="settings-panel">
        <div class="rate-input">
          <label for="hourlyRate">Taux horaire (¥) :</label>
          <input type="number" id="hourlyRate" step="100" value="1000" />
        </div>
      </div>

      <div class="time-entry-form">
        <h2>Nouvelle entrée</h2>
        <form id="workForm">
          <div class="form-group">
            <label for="date">Date :</label>
            <input type="date" id="date" required />
          </div>
          <div class="form-group time-inputs">
            <div>
              <label for="startTime">Début :</label>
              <input type="time" id="startTime" required />
            </div>
            <div>
              <label for="endTime">Fin :</label>
              <input type="time" id="endTime" required />
            </div>
          </div>
          <button type="submit">登録 | Enregistrer</button>
        </form>
      </div>

      <div class="time-entry-form">
        <h2>Gains supplémentaires</h2>
        <form id="extraForm">
          <div class="form-group">
            <label for="extraAmount">Montant (¥) :</label>
            <input type="number" id="extraAmount" required step="100" min="0" />
          </div>
          <div class="form-group">
            <label for="extraDescription">Description :</label>
            <input type="text" id="extraDescription" required />
          </div>
          <button type="submit">Ajouter</button>
        </form>
      </div>

      <div class="summary-section">
        <h2>Résumé de <span id="currentMonth">...</span></h2>
        <div class="summary-stats">
          <div class="stat-box">
            <h3>Heures totales</h3>
            <p id="totalHours">0h</p>
          </div>
          <div class="stat-box">
            <h3>Gains totaux</h3>
            <p id="totalEarnings">0€</p>
          </div>
        </div>

        <div class="goal-progress">
          <h3>Progression vers l'objectif</h3>
          <div class="progress-container">
            <div class="progress-circle">
              <div id="progressValue">0%</div>
            </div>
            <div class="goal-info">
              <p>Objectif : <span id="monthlyGoal">¥100,000</span></p>
              <p>Restant : <span id="remainingAmount">¥100,000</span></p>
            </div>
          </div>
        </div>
      </div>

      <div class="sections-container">
        <div class="section time-entries">
          <div class="entries-list">
            <h2>Entrées de <span id="entriesMonth">...</span></h2>
            <div id="entriesList"></div>
          </div>
        </div>

        <div class="section extra-earnings">
          <div class="extra-earnings-list">
            <h2>Gains supplémentaires de <span id="extraMonth">...</span></h2>
            <div id="extraList"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="particles.js"></script>
    <script src="script.js"></script>
  </body>
</html>
